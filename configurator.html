<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LAVAL — Mantel Editor</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/glacial-indifference-2" rel="stylesheet">
  <style>
:root{
  --env:#d4ccc0;--env-mid:#c8c0b4;--env-deep:#bdb5a8;
  --glass-l:rgba(234,228,218,.84);--glass-r:rgba(232,226,216,.82);--glass-bar:rgba(238,233,224,.94);--glass-util:rgba(240,235,228,.92);
  --text:#1a1714;--muted:#6b635a;--faint:rgba(26,23,20,.28);--line:rgba(26,23,20,.08);--ring:rgba(128,114,100,.58);--ring-glow:rgba(148,132,114,.15);
  --serif:'Cormorant Garamond','Times New Roman',serif;--sans:'Glacial Indifference',system-ui,sans-serif;
  --ease:cubic-bezier(.25,.46,.45,.94);--fast:140ms;--med:240ms;--slow:480ms;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,.app{height:100%;overflow:hidden}
body{font-family:var(--sans);background:var(--env);color:var(--text);-webkit-font-smoothing:antialiased}
.scene-root{position:fixed;inset:0;overflow:hidden}
.scene-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 90% at 50% 44%,rgba(216,208,196,.55) 0%,transparent 70%),linear-gradient(180deg,var(--env-deep) 0%,var(--env) 60%,var(--env-mid) 100%);z-index:0}
.scene-atmo{position:absolute;inset:0;background:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(240,235,228,.12) 0%,transparent 100%),radial-gradient(ellipse 100% 30% at 50% 100%,rgba(26,23,20,.06) 0%,transparent 100%);z-index:1;pointer-events:none}
.subject-layer{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:2;transform-origin:center center;will-change:transform;transition:transform 260ms var(--ease)}
.subject-layer.instant{transition:none}
.mantel-subject{position:relative;width:clamp(320px,44vw,560px);height:clamp(460px,80vh,740px);background:linear-gradient(168deg,#cec6b8 0%,#c0b8a8 32%,#b2a898 64%,#a4988a 100%);border:.5px solid rgba(165,155,142,.18);box-shadow:0 0 80px rgba(26,23,20,.06),0 8px 32px rgba(26,23,20,.08),0 24px 64px rgba(26,23,20,.07),0 48px 120px rgba(26,23,20,.05);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;transition:transform var(--slow) var(--ease)}
.mantel-subject[data-focus="profile"]{transform:translateY(-4%)}
.mantel-subject[data-focus="leg"]{transform:translateY(5%)}
.mantel-subject[data-focus="shelf"]{transform:translateY(-7%)}
.subject-label{font-family:var(--serif);font-size:14px;font-style:italic;font-weight:300;letter-spacing:.14em;color:rgba(42,38,33,.26)}
.subject-readout{font-size:.51rem;letter-spacing:.16em;text-transform:uppercase;color:rgba(42,38,33,.18);text-align:center;max-width:76%;line-height:2}
.zone-dot{position:absolute;width:6px;height:6px;border-radius:50%;background:rgba(238,233,226,.82);border:1.5px solid rgba(98,90,80,.42);opacity:0;transition:opacity 260ms var(--ease);z-index:3;transform:translate(-50%,-50%)}
.zone-dot.on{opacity:1}
.hud-overlay{position:absolute;inset:0;z-index:10;pointer-events:none}.hud-overlay>*{pointer-events:auto}
.cmd-tl{position:absolute;top:16px;left:18px;display:flex;align-items:center;gap:10px;background:var(--glass-util);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:.5px solid rgba(26,23,20,.09);border-radius:10px;padding:8px 14px;box-shadow:0 2px 10px rgba(26,23,20,.07)}
.cmd-logo{font-family:var(--serif);font-size:1.1rem;font-weight:400;letter-spacing:.24em;text-transform:uppercase;color:var(--text)}
.cmd-sep{color:var(--line);font-size:.7rem}
.cmd-back{font-size:.56rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:opacity var(--fast)}
.cmd-back:hover{opacity:.55}
.util-pill{position:absolute;top:16px;left:50%;transform:translateX(-50%);display:flex;align-items:center;background:var(--glass-util);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:.5px solid rgba(26,23,20,.09);border-radius:10px;padding:2px;box-shadow:0 2px 10px rgba(26,23,20,.07)}
.util-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:transparent;border:none;cursor:pointer;font-size:14px;color:var(--muted);border-radius:8px;transition:background var(--fast),color var(--fast)}
.util-btn:hover{background:rgba(26,23,20,.06);color:var(--text)}.util-div{width:.5px;height:14px;background:var(--line);flex-shrink:0;margin:0 1px}
.win-l{position:absolute;top:62px;left:18px;bottom:76px;width:208px;background:var(--glass-l);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border:.5px solid rgba(26,23,20,.08);border-radius:14px;box-shadow:0 4px 24px rgba(26,23,20,.08),0 1px 4px rgba(26,23,20,.05);display:flex;flex-direction:column;overflow:hidden}
.win-l-body{flex:1;padding:20px 16px 14px;display:flex;flex-direction:column;overflow:hidden}
.sum-head{font-size:.52rem;letter-spacing:.22em;text-transform:uppercase;color:rgba(26,23,20,.26);margin-bottom:16px}.sum-list{list-style:none}
.sum-row{display:flex;flex-direction:column;gap:2px;padding:9px 0;border-bottom:.5px solid var(--line)}.sum-row:first-child{border-top:.5px solid var(--line)}
.sum-lbl{font-size:.49rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(26,23,20,.26)}
.sum-val{font-family:var(--serif);font-size:15px;font-weight:400;color:var(--text);line-height:1.2}.sum-val.empty{color:rgba(26,23,20,.15);font-style:italic;font-weight:300}
.cta-btn{display:flex;align-items:center;justify-content:center;min-height:44px;background:var(--text);border:none;color:rgba(238,233,226,.94);font-family:var(--sans);font-size:.63rem;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;flex-shrink:0;transition:opacity var(--fast);border-radius:0 0 13px 13px}.cta-btn:hover{opacity:.82}
.win-r{position:absolute;top:62px;right:18px;bottom:76px;width:285px;background:var(--glass-r);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border:.5px solid rgba(26,23,20,.08);border-radius:14px;box-shadow:0 4px 24px rgba(26,23,20,.08),0 1px 4px rgba(26,23,20,.05);display:flex;flex-direction:column;overflow:hidden}
.insp-head{padding:15px 14px 10px;border-bottom:.5px solid var(--line);flex-shrink:0}.insp-tag{font-size:.52rem;letter-spacing:.22em;text-transform:uppercase;color:rgba(26,23,20,.26);margin-bottom:3px}.insp-name{font-family:var(--serif);font-size:21px;font-weight:300;color:var(--text);letter-spacing:.02em;line-height:1}
.insp-body{flex:1;overflow-y:auto;padding:11px 11px 20px;scrollbar-width:thin;scrollbar-color:rgba(26,23,20,.06) transparent}.insp-body::-webkit-scrollbar{width:2px}.insp-body::-webkit-scrollbar-thumb{background:rgba(26,23,20,.06);border-radius:2px}
.mode-pill{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;align-items:center;background:var(--glass-bar);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:.5px solid rgba(26,23,20,.10);border-radius:60px;padding:4px;box-shadow:0 4px 20px rgba(26,23,20,.10),0 1px 4px rgba(26,23,20,.05);white-space:nowrap}
.mode-btn{display:flex;align-items:center;gap:7px;padding:8px 15px;border-radius:52px;border:none;background:transparent;cursor:pointer;transition:background var(--fast)}.mode-btn:hover{background:rgba(26,23,20,.04)}.mode-btn.active{background:var(--text)}.mode-sep{width:.5px;height:16px;background:rgba(26,23,20,.09);flex-shrink:0}
.mode-ring{width:9px;height:9px;border-radius:50%;border:1px solid rgba(26,23,20,.22);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all var(--fast)}.mode-btn.active .mode-ring{border-color:rgba(238,233,226,.48)}.mode-btn.done .mode-ring{border-color:var(--muted);background:var(--muted)}
.mode-dot{width:4px;height:4px;border-radius:50%;background:rgba(238,233,226,.90);opacity:0;transition:opacity var(--fast);flex-shrink:0}.mode-btn.active .mode-dot{opacity:1}
.mode-num{font-family:var(--serif);font-size:11px;font-weight:300;letter-spacing:.06em;color:rgba(26,23,20,.28);transition:color var(--fast)}.mode-lbl{font-size:.53rem;letter-spacing:.16em;text-transform:uppercase;color:rgba(26,23,20,.32);transition:color var(--fast)}
.mode-btn.active .mode-num,.mode-btn.active .mode-lbl{color:rgba(238,233,226,.90)}.mode-btn.done .mode-num,.mode-btn.done .mode-lbl{color:rgba(26,23,20,.38)}
@keyframes gridEnter{from{opacity:0;transform:translateX(7px)}to{opacity:1;transform:translateX(0)}}.opts-grid.entering{animation:gridEnter 180ms var(--ease) both}
.grid-family{display:grid;grid-template-columns:1fr;gap:8px}.grid-profile{display:grid;grid-template-columns:1fr 1fr;gap:7px}.grid-chip{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}.grid-swatch{display:flex;flex-wrap:wrap;gap:14px 15px;padding:3px 1px;align-items:flex-start}
.opt-card{cursor:pointer;background:rgba(255,255,255,.20);border:.5px solid rgba(26,23,20,.08);overflow:hidden;border-radius:8px;transition:background var(--fast),box-shadow var(--fast),transform var(--fast)}
.type-family{border-radius:10px}.type-family .opt-thumb{width:100%;aspect-ratio:16/5;overflow:hidden;border-radius:9px 9px 0 0}.type-family .opt-body{padding:12px 13px 13px}.type-family .opt-name{font-family:var(--serif);font-size:19px;font-weight:400;color:var(--text);margin-bottom:4px;letter-spacing:.01em;line-height:1.1}.type-family .opt-desc{font-size:.67rem;font-weight:300;color:var(--muted);line-height:1.6;max-width:32ch}.type-family:hover{background:rgba(255,255,255,.42)}.type-family.sel{background:rgba(255,255,255,.64);border-color:transparent;box-shadow:0 0 0 1.5px var(--ring),0 0 18px var(--ring-glow);transform:scale(1.01)}
.type-profile{border-radius:9px}.type-profile .opt-thumb{width:100%;aspect-ratio:3/4;overflow:hidden;border-radius:8px 8px 0 0}.type-profile .opt-body{padding:7px 8px 9px}.type-profile .opt-name{font-family:var(--serif);font-size:13px;font-weight:400;color:var(--text);line-height:1.2}.type-profile:hover{background:rgba(255,255,255,.40)}.type-profile.sel{background:rgba(255,255,255,.60);border-color:transparent;box-shadow:0 0 0 1.5px var(--ring),0 0 12px var(--ring-glow);transform:scale(1.016)}
.type-leg,.type-shelf{border-radius:7px}.type-leg .opt-thumb,.type-shelf .opt-thumb{width:100%;aspect-ratio:1/1;overflow:hidden;border-radius:6px 6px 0 0}.type-leg .opt-body,.type-shelf .opt-body{padding:4px 4px 5px}.type-leg .opt-name,.type-shelf .opt-name{font-size:.51rem;color:var(--text);letter-spacing:.01em;line-height:1.2;text-align:center}.type-leg:hover,.type-shelf:hover{background:rgba(255,255,255,.38)}.type-leg.sel,.type-shelf.sel{background:rgba(255,255,255,.58);border-color:transparent;box-shadow:0 0 0 1.5px var(--ring),0 0 9px var(--ring-glow);transform:scale(1.018)}
.swatch-item{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;width:54px;background:transparent;border:none}.swatch-circle{width:42px;height:42px;border-radius:50%;border:.5px solid rgba(26,23,20,.10);flex-shrink:0;transition:transform 130ms,box-shadow 130ms;box-shadow:0 2px 6px rgba(26,23,20,.07)}.swatch-item:hover .swatch-circle{transform:scale(1.11)}.swatch-item.sel .swatch-circle{box-shadow:0 0 0 3px var(--env),0 0 0 5px var(--ring),0 4px 10px rgba(26,23,20,.09);transform:scale(1.12)}.swatch-label{font-size:.50rem;color:var(--muted);text-align:center;line-height:1.3;max-width:52px}.swatch-item.sel .swatch-label{color:var(--text)}
#bundleCodes{font-size:.52rem;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);padding:10px 14px 0}
@media (max-width:1180px){.win-l{width:190px}.win-r{width:260px}}
@media (max-width:1024px){html,body,.app{overflow:auto;height:auto;min-height:100%}.scene-root{position:relative;min-height:100vh}.subject-layer{padding:110px 0 210px}.win-l,.win-r{top:auto;bottom:auto;position:relative;left:auto;right:auto;width:min(92vw,420px);margin:0 auto 14px}.win-r{margin-top:24px}.mode-pill{position:fixed;left:50%;bottom:14px;max-width:calc(100vw - 24px);overflow:auto}.util-pill{right:12px;left:auto;transform:none}.cmd-tl{left:12px;right:12px;max-width:max-content}}
  </style>
</head>
<body>
<div class="app">
  <div class="scene-root" id="sceneRoot">
    <div class="scene-bg"></div>
    <div class="scene-atmo"></div>
    <div class="subject-layer" id="subjectLayer">
      <div class="mantel-subject" id="mantelSubject" data-focus="family">
        <div class="zone-dot" id="zd-profile" style="top:28%;left:50%"></div>
        <div class="zone-dot" id="zd-leg" style="top:74%;left:22%"></div>
        <div class="zone-dot" id="zd-shelf" style="top:13%;left:50%"></div>
        <span class="subject-label">Mantel Preview</span>
        <div class="subject-readout" id="previewReadout">Select a family to begin</div>
      </div>
    </div>
    <div class="hud-overlay">
      <div class="cmd-tl"><span class="cmd-logo">LAVAL</span><span class="cmd-sep">|</span><a href="index.html" class="cmd-back">← Return to Site</a></div>
      <div class="util-pill"><button class="util-btn" onclick="stageZoom(1)" title="Zoom in">+</button><div class="util-div"></div><button class="util-btn" onclick="stageZoom(-1)" title="Zoom out">−</button><div class="util-div"></div><button class="util-btn" onclick="stageReset()" title="Reset">↺</button></div>
      <div class="win-l">
        <div class="win-l-body">
          <p class="sum-head">Configuration</p>
          <ul class="sum-list">
            <li class="sum-row"><span class="sum-lbl">Family</span><span class="sum-val empty" id="sum-family">—</span></li>
            <li class="sum-row"><span class="sum-lbl">Profile</span><span class="sum-val empty" id="sum-profile">—</span></li>
            <li class="sum-row"><span class="sum-lbl">Leg</span><span class="sum-val empty" id="sum-leg">—</span></li>
            <li class="sum-row"><span class="sum-lbl">Shelf</span><span class="sum-val empty" id="sum-shelf">—</span></li>
            <li class="sum-row"><span class="sum-lbl">Finish</span><span class="sum-val empty" id="sum-finish">—</span></li>
          </ul>
        </div>
        <button class="cta-btn" onclick="requestPricing()"><span>Request Pricing</span></button>
        <div id="bundleBlock" style="display:none"><div id="bundleCodes"></div></div>
      </div>
      <div class="win-r" id="rightPanel">
        <div class="insp-head"><div class="insp-tag" id="optTag">Step 01</div><div class="insp-name" id="optName">Family</div></div>
        <div class="insp-body"><div class="opts-grid grid-family" id="optGrid"></div></div>
      </div>
      <nav class="mode-pill" id="stepBar">
        <button class="mode-btn active" data-step="family" onclick="goToStep('family')"><div class="mode-ring"><div class="mode-dot"></div></div><span class="mode-num">01</span><span class="mode-lbl">Family</span></button>
        <div class="mode-sep"></div>
        <button class="mode-btn" data-step="profile" onclick="goToStep('profile')"><div class="mode-ring"><div class="mode-dot"></div></div><span class="mode-num">02</span><span class="mode-lbl">Profile</span></button>
        <div class="mode-sep"></div>
        <button class="mode-btn" data-step="leg" onclick="goToStep('leg')"><div class="mode-ring"><div class="mode-dot"></div></div><span class="mode-num">03</span><span class="mode-lbl">Leg</span></button>
        <div class="mode-sep"></div>
        <button class="mode-btn" data-step="shelf" onclick="goToStep('shelf')"><div class="mode-ring"><div class="mode-dot"></div></div><span class="mode-num">04</span><span class="mode-lbl">Shelf</span></button>
        <div class="mode-sep"></div>
        <button class="mode-btn" data-step="finish" onclick="goToStep('finish')"><div class="mode-ring"><div class="mode-dot"></div></div><span class="mode-num">05</span><span class="mode-lbl">Finish</span></button>
      </nav>
    </div>
  </div>
</div>
<script>
const PROFILES={
  'SS-P1':{name:'Rounded Cove',op:'OP-02',fr:'FR-04'},'SS-P2':{name:'Wave Frieze',op:'OP-03',fr:'FR-05'},'SS-P3':{name:'Niche Arch',op:'OP-05',fr:'FR-04'},
  'TC-P1':{name:'Framed Rectilinear',op:'OP-01',fr:'FR-02'},'TC-P2':{name:'Fluted Lintel',op:'OP-01',fr:'FR-03'},'TC-P3':{name:'Soft Arch Frame',op:'OP-02',fr:'FR-03'},
  'FO-P1':{name:'Crest Arch',op:'OP-03',fr:'FR-05'},'FO-P2':{name:'Baroque Relief',op:'OP-03',fr:'FR-06'},'FO-P3':{name:'Columned Arch',op:'OP-04',fr:'FR-05'}
};
const LEGS={'LG-1':{name:'Plain Jamb'},'LG-2':{name:'Fluted Pilaster'},'LG-3':{name:'Rounded Sculpted'},'LG-4':{name:'Tapered Curve'},'LG-5':{name:'French Scroll'}};
const SHELVES={'SH-1':{name:'Classical Shelf'},'SH-2':{name:'Mitered Frame Shelf'},'SH-3':{name:'Sculpted Crown'},'SH-4':{name:'French Serpentine Shelf'}};
const FINISHES={
  'FN-1':{name:'Pale Limestone',bg:'linear-gradient(140deg,#ddd7cc,#ccc6ba)'},'FN-2':{name:'Soft Ivory Stone',bg:'linear-gradient(140deg,#e8e0d0,#d8cfc0)'},
  'FN-3':{name:'White Marble',bg:'linear-gradient(140deg,#e8e8e4,#d4d2cc)'},'FN-4':{name:'Dramatic Veined Marble',bg:'linear-gradient(140deg,#c8c4bc,#8a8880)'},'FN-5':{name:'Warm Taupe Stone',bg:'linear-gradient(140deg,#c8bc9e,#b0a492)'}
};
const FAMILIES={
  'FM-02':{name:'Forma',description:'Soft massing and restrained sculptural presence.',bg:'linear-gradient(148deg,#c4bdb0 0%,#a8a090 100%)',profiles:['SS-P1','SS-P2','SS-P3'],legs:['LG-3','LG-4'],shelves:['SH-3','SH-4'],finishes:['FN-1','FN-2','FN-3','FN-5']},
  'FM-01':{name:'Aurelia',description:'Classical proportion with a cleaner architectural read.',bg:'linear-gradient(148deg,#c0bab2 0%,#a09892 100%)',profiles:['TC-P1','TC-P2','TC-P3'],legs:['LG-1','LG-2','LG-4'],shelves:['SH-1','SH-2'],finishes:['FN-1','FN-2','FN-3','FN-4','FN-5']},
  'FM-03':{name:'Seraphine',description:'Decorative richness, softened for a more current room.',bg:'linear-gradient(148deg,#c8bfb0 0%,#b0a498 100%)',profiles:['FO-P1','FO-P2','FO-P3'],legs:['LG-4','LG-5'],shelves:['SH-3','SH-4'],finishes:['FN-2','FN-3','FN-4']}
};
const THUMB_BG={'SS':'linear-gradient(140deg,#c0b8a8,#a8a092)','TC':'linear-gradient(140deg,#bab4aa,#9e9890)','FO':'linear-gradient(140deg,#c4beb2,#aca49a)','LG':'linear-gradient(140deg,#b8b2a8,#a09a92)','SH':'linear-gradient(140deg,#c0bab0,#a8a298)'};
const STEPS=['family','profile','leg','shelf','finish'];
const state={step:'family',family:{slug:null,name:null},profile:{slug:null,name:null},leg:{slug:null,name:null},shelf:{slug:null,name:null},finish:{slug:null,name:null}};
const GRID_CLASS={family:'opts-grid grid-family',profile:'opts-grid grid-profile',leg:'opts-grid grid-chip',shelf:'opts-grid grid-chip',finish:'opts-grid grid-swatch'};
function renderGrid(){const grid=document.getElementById('optGrid'),tag=document.getElementById('optTag'),name=document.getElementById('optName'),idx=STEPS.indexOf(state.step);tag.textContent='Step 0'+(idx+1);name.textContent=state.step.charAt(0).toUpperCase()+state.step.slice(1);grid.innerHTML='';grid.className=GRID_CLASS[state.step];if(state.step==='family'){Object.entries(FAMILIES).forEach(([slug,fam])=>grid.appendChild(makeCard({name:fam.name,desc:fam.description,thumbBg:fam.bg,type:'family',selected:state.family.slug===slug,onClick:()=>pick('family',slug,fam.name)})))}else{const fam=FAMILIES[state.family.slug];if(fam){const maps={profile:[fam.profiles,PROFILES,'profile'],leg:[fam.legs,LEGS,'leg'],shelf:[fam.shelves,SHELVES,'shelf'],finish:[fam.finishes,FINISHES,'finish']};const [allowed,dict,stepKey]=maps[state.step];allowed.forEach(slug=>{const item=dict[slug],prefix=slug.split('-')[0],thumbBg=stepKey==='finish'?(item.bg||THUMB_BG[prefix]||''):(THUMB_BG[prefix]||'');grid.appendChild(makeCard({name:item.name,desc:null,thumbBg,type:stepKey,selected:state[stepKey].slug===slug,onClick:()=>pick(stepKey,slug,item.name)}))})}}grid.classList.remove('entering');void grid.offsetWidth;grid.classList.add('entering')}
function makeCard({name,desc,thumbBg,type,selected,onClick}){const card=document.createElement(type==='finish'?'button':'div');if(type==='finish'){card.type='button';card.className='swatch-item'+(selected?' sel':'');const c=document.createElement('div');c.className='swatch-circle';c.style.background=thumbBg||'#b0a898';const l=document.createElement('span');l.className='swatch-label';l.textContent=name;card.append(c,l)}else{card.className='opt-card type-'+type+(selected?' sel':'');const t=document.createElement('div');t.className='opt-thumb';t.style.background=thumbBg||'#b0a898';const b=document.createElement('div');b.className='opt-body';const n=document.createElement('div');n.className='opt-name';n.textContent=name;b.appendChild(n);if(desc){const d=document.createElement('div');d.className='opt-desc';d.textContent=desc;b.appendChild(d)}card.append(t,b)}card.addEventListener('click',onClick);return card}
function renderSummary(){['family','profile','leg','shelf','finish'].forEach(k=>{const el=document.getElementById('sum-'+k),v=state[k].name;el.textContent=v||'—';el.classList.toggle('empty',!v)})}
function renderReadout(){const parts=STEPS.map(s=>state[s].name).filter(Boolean);document.getElementById('previewReadout').textContent=parts.length?parts.join(' · '):'Select a family to begin'}
function renderStepBar(){document.querySelectorAll('.mode-btn').forEach(btn=>{const s=btn.dataset.step;btn.classList.toggle('active',s===state.step);btn.classList.toggle('done',s!==state.step&&state[s].slug!==null)})}
function updateZoneDots(){['profile','leg','shelf'].forEach(z=>document.getElementById('zd-'+z).classList.remove('on'));if(['profile','leg','shelf'].includes(state.step))document.getElementById('zd-'+state.step).classList.add('on')}
function render(){renderGrid();renderSummary();renderReadout();renderStepBar();updateZoneDots()}
function pick(step,slug,name){state[step]={slug,name};if(step==='family'){state.profile={slug:null,name:null};state.leg={slug:null,name:null};state.shelf={slug:null,name:null};state.finish={slug:null,name:null};render();setTimeout(()=>goToStep('profile'),300);return}render();const next=STEPS[STEPS.indexOf(step)+1];if(next)setTimeout(()=>goToStep(next),300)}
function goToStep(step){state.step=step;document.getElementById('mantelSubject').dataset.focus=step;render()}
function requestPricing(){const pd=state.profile.slug?PROFILES[state.profile.slug]:null;const payload={family_name:state.family.name,family_slug:state.family.slug,profile_name:state.profile.name,profile_slug:state.profile.slug,leg_name:state.leg.name,leg_slug:state.leg.slug,shelf_name:state.shelf.name,shelf_slug:state.shelf.slug,finish_name:state.finish.name,finish_slug:state.finish.slug,internal_mapping_bundle:{family_internal:state.family.slug,op_code:pd?pd.op:null,fr_code:pd?pd.fr:null}};console.log('[LAVAL] Request Pricing Payload:\n'+JSON.stringify(payload,null,2));const btn=document.querySelector('.cta-btn span'),original=btn.textContent;btn.textContent='Logged to Console';setTimeout(()=>btn.textContent=original,2200)}
let _zoom=1,_panX=0,_panY=0,_dragging=false,_dragOrig={x:0,y:0},_panOrig={x:0,y:0};const ZOOM_LEVELS=[1,1.5,2];
function applyXform(){document.getElementById('subjectLayer').style.transform='scale('+_zoom+') translate('+_panX+'px,'+_panY+'px)'}
function stageZoom(dir){const cur=ZOOM_LEVELS.findIndex(l=>Math.abs(l-_zoom)<.05),next=Math.max(0,Math.min(ZOOM_LEVELS.length-1,(cur<0?0:cur)+dir));_zoom=ZOOM_LEVELS[next];if(_zoom===1){_panX=0;_panY=0}applyXform()}
function stageReset(){_zoom=1;_panX=0;_panY=0;applyXform()}
document.addEventListener('mousedown',e=>{if(!e.target.closest('#sceneRoot')||e.target.closest('.hud-overlay'))return;if(_zoom<=1)return;_dragging=true;_dragOrig={x:e.clientX,y:e.clientY};_panOrig={x:_panX,y:_panY};document.getElementById('subjectLayer').classList.add('instant')});
document.addEventListener('mousemove',e=>{if(!_dragging)return;_panX=_panOrig.x+(e.clientX-_dragOrig.x)/_zoom;_panY=_panOrig.y+(e.clientY-_dragOrig.y)/_zoom;applyXform()});
document.addEventListener('mouseup',()=>{if(!_dragging)return;_dragging=false;document.getElementById('subjectLayer').classList.remove('instant')});
render();
</script>
</body>
</html>
